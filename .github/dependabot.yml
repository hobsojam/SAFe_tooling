version: 2
updates:
- package-ecosystem: pip
  directory: "/"
  schedule:
    interval: weekly
  cooldown:
    default-days: 7
  groups:
    python-packages:
      patterns:
        - "*"
  ignore:
    # mutmut v3 removed the `mutmut html` subcommand used in mutation.yml to
    # generate the HTML artifact. The nightly workflow and pyproject.toml are
    # both pinned to >=2,<3. Do not upgrade until the workflow is updated to
    # work without HTML reporting (e.g. via `mutmut results` + step summary).
    - dependency-name: "mutmut"
      versions: [">=3"]

- package-ecosystem: npm
  directory: "/frontend"
  schedule:
    interval: weekly
  cooldown:
    default-days: 7
  groups:
    npm-packages:
      patterns:
        - "*"
  ignore:
    # TypeScript 7 (the native-port rewrite) dropped legacy compiler API
    # functions such as ts.parseConfigFileTextToJson, which
    # @stryker-mutator/core's tsconfig preprocessor still calls. Bumping to
    # TS 7 crashed the nightly TQA job (Stryker: "TypeError:
    # ts.parseConfigFileTextToJson is not a function", run 29631266894).
    # package.json pins typescript to ~6.0.3 for the same reason. Do not
    # upgrade until Stryker supports the TypeScript 7 API.
    - dependency-name: "typescript"
      versions: [">=7"]
