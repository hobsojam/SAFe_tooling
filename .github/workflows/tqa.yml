name: Test Quality Analysis

# Runs nightly against main so mutation testing does not slow down PR feedback.
# Results are visible in the Actions run summary (Step Summary) and fed into
# SonarCloud as external issues so mutation survivors appear alongside coverage.
# Trigger manually via workflow_dispatch when you need an on-demand report.
on:
  schedule:
    - cron: '0 2 * * *'  # 02:00 UTC nightly, runs against main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tqa:
    name: TQA
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # SonarCloud requires full git history for blame/new-code detection

      # ── Python ────────────────────────────────────────────────────────────
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -e ".[dev]" "mutmut>=2,<3" "git+https://github.com/hobsojam/test-analysis.git"

      - name: Run Python tests with coverage
        run: pytest --cov=safe --cov-report=xml

      - name: Run Python mutation tests
        run: mutmut run --no-progress
        continue-on-error: true

      - name: Export mutmut JUnit XML
        run: mutmut junitxml > mutmut.xml

      # ── Frontend ──────────────────────────────────────────────────────────
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test:run

      - name: Run frontend mutation tests
        working-directory: frontend
        run: npm run stryker
        continue-on-error: true

      # ── TQA ───────────────────────────────────────────────────────────────
      # --format sonarcloud writes sonar-generic-issues.json (surviving mutants
      # as SonarCloud external issues) and prints the markdown summary to stdout.
      # Appending stdout to $GITHUB_STEP_SUMMARY makes the report visible on the
      # Actions run page without needing a PR to comment on.
      - name: Analyse with TQA
        id: tqa
        run: tqa analyze --config tqa.toml --format sonarcloud >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      # ── SonarCloud ────────────────────────────────────────────────────────
      # sonar-project.properties expects coverage at coverage/ and coverage-frontend/
      # (matching the artifact layout used by the regular ci.yml sonar job).
      # Stage the files here so this job reuses the same properties file.
      - name: Stage coverage files for SonarCloud
        run: |
          mkdir -p coverage coverage-frontend
          cp coverage.xml coverage/
          cp frontend/coverage/lcov.info coverage-frontend/

      # Pass sonar.externalIssuesReportPaths inline rather than adding it to
      # sonar-project.properties, so the regular CI sonar job (which does not
      # produce sonar-generic-issues.json) is not affected.
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        with:
          args: -Dsonar.externalIssuesReportPaths=sonar-generic-issues.json
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
