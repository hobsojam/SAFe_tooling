sonar.projectKey=hobsojam_SAFe_tooling
sonar.organization=hobsojam

sonar.projectName=SAFe_tooling

sonar.sources=safe,frontend/src
sonar.exclusions=tests/**,**/__tests__/**,frontend/dist/**,frontend/coverage/**,**/__pycache__/**,**/*.pyc

# Pages excluded from coverage enforcement until unit tests reach ≥75% — see #274.
# E2e (Playwright) coverage exists but is not reported to SonarCloud.
sonar.coverage.exclusions=frontend/src/pages/TeamSetup.tsx,frontend/src/pages/StoriesPage.tsx,frontend/src/pages/Setup.tsx,frontend/src/pages/RoamUnroamed.tsx,frontend/src/pages/Risks.tsx

sonar.sourceEncoding=UTF-8

sonar.python.coverage.reportPaths=coverage/coverage.xml
sonar.javascript.lcov.reportPaths=coverage-frontend/lcov.info
sonar.python.version=3.11,3.12,3.13
