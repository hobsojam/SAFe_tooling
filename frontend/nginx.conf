server {
    listen 8080;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — always serve index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to FastAPI (strips /api prefix)
    location /api/ {
        proxy_pass ${API_UPSTREAM_URL}/;
        # Use the upstream hostname in Host so Render's CDN routes to the API
        # service, not back to this frontend service.
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Required when upstream is https:// — sends SNI hostname so the
        # upstream's TLS certificate can be matched correctly.
        proxy_ssl_server_name on;

        # Allow for free-tier cold starts (~30 s wake-up time on Render).
        proxy_connect_timeout 35s;
        proxy_read_timeout    65s;
        proxy_send_timeout    65s;
    }
}
