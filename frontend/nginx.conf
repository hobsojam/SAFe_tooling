server {
    listen 8080;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — always serve index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to FastAPI (strips /api prefix)
    location /api/ {
        proxy_pass ${API_UPSTREAM_URL}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Required when upstream is https:// — sends SNI hostname so the
        # upstream's TLS certificate can be matched correctly.
        proxy_ssl_server_name on;
    }
}
